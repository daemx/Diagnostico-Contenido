<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico de Contenido — Generador</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#534AB7;--purple-light:#EEEDFE;--purple-dark:#3C3489;
  --teal:#0F6E56;--teal-light:#E1F5EE;
  --coral:#993C1D;--coral-light:#FAECE7;
  --amber:#854F0B;--amber-light:#FAEEDA;
  --blue:#185FA5;--blue-light:#E6F1FB;
  --gray:#f5f4f0;--border:#e0dfd8;--text:#1a1a1a;--sub:#888;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray);min-height:100vh;padding:24px 16px;display:flex;justify-content:center}
.app{width:100%;max-width:640px}

/* CONFIG PANEL */
.config-panel{background:#fff;border-radius:14px;padding:20px 24px;border:0.5px solid var(--border);margin-bottom:16px}
.config-title{font-size:12px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.config-title::after{content:'';flex:1;height:0.5px;background:var(--border)}
.config-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.config-row.full{grid-template-columns:1fr}
label{font-size:12px;font-weight:600;color:var(--text);margin-bottom:4px;display:block}
input,select,textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);background:#fff;outline:none;transition:border .15s;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--purple)}
textarea{resize:vertical;min-height:60px}
.config-note{font-size:11px;color:var(--sub);margin-top:4px;line-height:1.5}
.config-note a{color:var(--purple);text-decoration:none}
.config-note a:hover{text-decoration:underline}

/* CARD */
.card{background:#fff;border-radius:14px;padding:28px 28px;border:0.5px solid var(--border);margin-bottom:16px}

/* PROGRESS */
.prog-wrap{margin-bottom:24px}
.prog-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:10px}
.prog-fill{height:100%;background:var(--purple);border-radius:2px;transition:width .35s}
.prog-steps{display:flex;gap:6px;flex-wrap:wrap}
.prog-step{font-size:11px;padding:3px 10px;border-radius:20px;border:0.5px solid var(--border);color:var(--sub);background:#fff;font-weight:500}
.prog-step.done{background:var(--teal-light);color:var(--teal);border-color:#9FE1CB}
.prog-step.active{background:var(--purple);color:#fff;border-color:var(--purple)}

/* STEPS */
.step{display:none}.step.active{display:block}
.step-label{font-size:11px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.step-q{font-size:17px;font-weight:700;color:var(--text);margin-bottom:4px;line-height:1.4}
.step-sub{font-size:13px;color:var(--sub);margin-bottom:20px;line-height:1.5}
.tag-multi{font-size:11px;color:var(--purple);background:var(--purple-light);padding:3px 10px;border-radius:20px;display:inline-block;margin-bottom:14px;font-weight:600}

/* OPTIONS */
.opts{display:flex;flex-direction:column;gap:8px}
.opts.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.opt{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;background:#fff;user-select:none}
.opt:hover{background:#f9f8f5;border-color:#c5c3f5}
.opt.sel{border-color:var(--purple);background:var(--purple-light)}
.opt-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:#f5f4f0;transition:background .15s}
.opt.sel .opt-icon{background:#dddcf8}
.opt-text{flex:1}
.opt-lbl{font-size:13px;font-weight:600;color:var(--text);line-height:1.3}
.opt.sel .opt-lbl{color:var(--purple-dark)}
.opt-sub{font-size:11px;color:var(--sub);margin-top:1px}
.chk{width:20px;height:20px;border-radius:50%;border:1.5px solid #d0cfc8;margin-left:auto;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.opt.sel .chk{background:var(--purple);border-color:var(--purple)}
.chk svg{opacity:0;transition:opacity .15s}.opt.sel .chk svg{opacity:1}

/* ACTIONS */
.actions{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
.btn{padding:9px 22px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;border:1px solid var(--border);background:#fff;color:#666}
.btn:hover{background:#f5f4f0}
.btn-primary{background:var(--purple);color:#fff;border-color:var(--purple)}
.btn-primary:hover{background:var(--purple-dark);border-color:var(--purple-dark)}
.btn-primary:disabled{background:#d0cfc8;border-color:#d0cfc8;color:#fff;cursor:not-allowed}
.btn-teal{background:var(--teal);color:#fff;border-color:var(--teal)}
.btn-teal:hover{background:#085041}
.btn-ghost{background:transparent;border:none;color:var(--sub);font-size:12px;padding:8px 0}

/* SUMMARY */
.sum-box{background:#f9f8f5;border-radius:10px;padding:16px 18px;margin-bottom:16px}
.sum-ttl{font-size:10px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.sum-row{display:flex;gap:12px;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:13px;align-items:flex-start}
.sum-row:last-child{border-bottom:none}
.sum-key{color:var(--sub);min-width:130px;flex-shrink:0;font-weight:500}
.sum-val{color:var(--text);font-weight:600;line-height:1.4}
.final-btn{width:100%;padding:13px;background:var(--purple);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s;margin-top:4px}
.final-btn:hover{background:var(--purple-dark)}

/* OUTPUT */
.out-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:0.5px solid var(--border)}
.out-avatar{width:48px;height:48px;border-radius:12px;background:var(--purple-light);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.out-name{font-size:16px;font-weight:700;color:var(--text)}
.out-meta{font-size:12px;color:var(--sub);margin-top:2px}
.out-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--teal-light);color:var(--teal);margin-top:3px}

.sec-block{border:0.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px}
.sec-head{padding:13px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;transition:background .15s}
.sec-head:hover{background:#f9f8f5}
.sec-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.sec-ttl{font-size:13px;font-weight:700;color:var(--text);flex:1}
.sec-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700}
.chev{font-size:14px;color:var(--sub);transition:transform .2s;margin-left:4px}
.chev.open{transform:rotate(180deg)}
.sec-body{display:none;padding:0 16px 16px}.sec-body.open{display:block}

.diag-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.diag-card{background:#f9f8f5;border-radius:8px;padding:11px 13px}
.diag-lbl{font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.diag-val{font-size:13px;font-weight:600;color:var(--text);line-height:1.4}

.ct-list{display:flex;flex-direction:column;gap:8px}
.ct-item{background:#f9f8f5;border-radius:8px;padding:11px 13px;display:flex;gap:10px}
.ct-num{width:22px;height:22px;border-radius:50%;background:var(--purple);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.ct-ttl{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
.ct-desc{font-size:12px;color:#555;line-height:1.5}
.ct-tag{font-size:10px;background:var(--purple-light);color:var(--purple-dark);padding:2px 7px;border-radius:10px;font-weight:700;display:inline-block;margin-top:4px}

.hook-list{display:flex;flex-direction:column;gap:8px}
.hook-item{background:#f9f8f5;border-left:3px solid var(--purple);border-radius:0 8px 8px 0;padding:10px 13px}
.hook-type{font-size:10px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.hook-txt{font-size:13px;color:var(--text);line-height:1.5;font-style:italic}

.plan-grid{display:flex;flex-direction:column;gap:8px}
.plan-week{background:#f9f8f5;border-radius:8px;padding:12px 14px}
.plan-week-ttl{font-size:12px;font-weight:700;color:var(--purple);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.plan-item{font-size:12px;color:#444;padding:4px 0;border-bottom:0.5px solid var(--border);display:flex;gap:8px;line-height:1.4}
.plan-item:last-child{border-bottom:none}
.plan-dot{width:6px;height:6px;border-radius:50%;background:var(--purple);flex-shrink:0;margin-top:5px}

.prompt-wrap{position:relative;margin-top:6px}
.prompt-lbl{font-size:11px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px;display:flex;align-items:center;gap:6px}
.prompt-lbl span{background:#f0f0ee;padding:2px 8px;border-radius:10px;font-size:10px}
.prompt-box{background:#1a1a2e;border-radius:10px;padding:15px;font-family:'SF Mono',Monaco,'Courier New',monospace;font-size:11px;line-height:1.8;color:#c8d3f5;white-space:pre-wrap;overflow-x:auto;max-height:280px;overflow-y:auto}
.copy-btn{position:absolute;top:8px;right:8px;background:var(--purple);color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s}
.copy-btn:hover{background:var(--purple-dark)}
.copy-btn.ok{background:var(--teal)}

.flag-box{background:#FFF8F0;border:0.5px solid #F0C87A;border-radius:8px;padding:11px 13px;font-size:12px;color:#7A5000;line-height:1.6;margin-top:10px}

.action-bar{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.action-bar .btn{flex:1;justify-content:center;display:flex;align-items:center;gap:6px;padding:11px 16px;font-size:13px}

/* GITHUB PUSH */
.push-section{background:#f9f8f5;border-radius:10px;padding:16px;margin-top:12px}
.push-ttl{font-size:12px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.push-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.push-status{font-size:12px;padding:8px 12px;border-radius:8px;margin-top:8px;display:none;line-height:1.5}
.push-status.ok{background:var(--teal-light);color:var(--teal);display:block}
.push-status.err{background:var(--coral-light);color:var(--coral);display:block}
.push-status.loading{background:var(--purple-light);color:var(--purple-dark);display:block}
</style>
</head>
<body>
<div class="app">

  <!-- CONFIG PANEL -->
  <div class="config-panel">
    <div class="config-title">⚙️ Configuración</div>
    <div class="config-row full">
      <div>
        <label>Tu nombre o agencia (aparece en el PDF)</label>
        <input type="text" id="agencia-nombre" placeholder="Mi Agencia de Contenido">
        <div class="config-note">El push a GitHub usa tus variables de entorno configuradas en Vercel. Seguro y sin exponer credenciales.</div>
      </div>
    </div>
  </div>

  <!-- MAIN CARD -->
  <div class="card">
    <div class="prog-wrap">
      <div class="prog-bar"><div class="prog-fill" id="prog" style="width:10%"></div></div>
      <div class="prog-steps" id="prog-steps"></div>
    </div>
    <div id="steps-cont"></div>
  </div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────
const STEPS=[
  {id:"empresa",lbl:"Paso 1 de 8",q:"¿Cuál es el nombre y giro de la empresa?",sub:"Esto aparecerá como encabezado en el PDF del diagnóstico.",type:"text",fields:[
    {id:"nombre",placeholder:"Nombre de la empresa",full:true},
    {id:"giro",placeholder:"Describe brevemente a qué se dedica",full:true,textarea:true}
  ]},
  {id:"sector",lbl:"Paso 2 de 8",q:"¿En qué sector opera?",sub:"Elige el que mejor describe su industria.",multi:false,grid:true,opts:[
    {v:"ecommerce",i:"🛒",l:"E-commerce",s:"Tienda online, DTC, marketplace"},
    {v:"logistica",i:"📦",l:"Logística / Importaciones",s:"Transporte, cadena de suministro"},
    {v:"salud",i:"🏥",l:"Salud / Bienestar",s:"Clínicas, spas, nutrición, gym"},
    {v:"educacion",i:"🎓",l:"Educación / Coaching",s:"Cursos, mentorías, formación"},
    {v:"restaurantes",i:"🍽️",l:"Food & Restaurantes",s:"Restaurantes, cafés, delivery"},
    {v:"tecnologia",i:"💻",l:"Tecnología / SaaS",s:"Software, apps, servicios digitales"},
    {v:"moda",i:"👗",l:"Moda / Lifestyle",s:"Ropa, accesorios, estilo de vida"},
    {v:"servicios",i:"🔧",l:"Servicios profesionales",s:"Agencias, consultoras, despachos"},
    {v:"inmobiliaria",i:"🏠",l:"Inmobiliaria / Construcción",s:"Bienes raíces, desarrolladores"},
    {v:"otro",i:"✳️",l:"Otro sector",s:"No está en la lista"}
  ]},
  {id:"plataforma",lbl:"Paso 3 de 8",q:"¿En qué plataformas quieren enfocarse?",sub:"Puedes elegir varias.",multi:true,grid:false,opts:[
    {v:"tiktok",i:"🎵",l:"TikTok",s:"Alcance masivo, formato corto"},
    {v:"reels",i:"📸",l:"Instagram Reels",s:"Comunidad y marca visual"},
    {v:"youtube",i:"▶️",l:"YouTube Shorts",s:"Búsqueda y autoridad"},
    {v:"linkedin",i:"💼",l:"LinkedIn",s:"B2B y networking"},
    {v:"todas",i:"🌐",l:"Todas",s:"Presencia completa"}
  ]},
  {id:"prioridad",lbl:"Paso 4 de 8",q:"¿Cuál es la prioridad del contenido?",sub:"Elige la que más importa ahora.",multi:false,grid:true,opts:[
    {v:"alcance",i:"📡",l:"Alcance / Visibilidad",s:"Llegar a más personas"},
    {v:"engagement",i:"💬",l:"Engagement",s:"Comentarios, shares, guardados"},
    {v:"ventas",i:"💰",l:"Ventas y leads",s:"Conversión directa"},
    {v:"marca",i:"🎯",l:"Identidad de marca",s:"Posicionamiento y confianza"}
  ]},
  {id:"cliente",lbl:"Paso 5 de 8",q:"¿A quién le habla este negocio?",sub:"¿Quiénes son sus clientes ideales?",multi:true,grid:true,opts:[
    {v:"pymes",i:"🏢",l:"Pequeñas y medianas empresas",s:"B2B"},
    {v:"emprendedores",i:"🚀",l:"Emprendedores",s:"Startups, freelancers"},
    {v:"consumidores",i:"🛍️",l:"Consumidor final",s:"B2C, persona natural"},
    {v:"profesionales",i:"👔",l:"Profesionales",s:"Ejecutivos, directivos"},
    {v:"jovenes",i:"🎮",l:"Jóvenes 18–30",s:"Gen Z y Millennials"},
    {v:"familias",i:"👨‍👩‍👧",l:"Familias",s:"Padres, hogares"}
  ]},
  {id:"contenido",lbl:"Paso 6 de 8",q:"¿Cómo está su presencia digital hoy?",sub:"Estado actual de su contenido en redes.",multi:false,grid:false,opts:[
    {v:"nada",i:"🚫",l:"Sin contenido todavía",s:"Empezamos desde cero"},
    {v:"poco",i:"📉",l:"Poco y sin estrategia",s:"Publicaciones esporádicas"},
    {v:"regular",i:"📊",l:"Publican regularmente",s:"Pero sin resultados claros"},
    {v:"bueno",i:"📈",l:"Tienen base sólida",s:"Quieren escalar"}
  ]},
  {id:"diferenciador",lbl:"Paso 7 de 8",q:"¿Qué los hace diferentes a la competencia?",sub:"Elige todos los que apliquen.",multi:true,grid:true,opts:[
    {v:"precio",i:"💲",l:"Mejor precio",s:"Tarifas más competitivas"},
    {v:"rapidez",i:"⚡",l:"Rapidez",s:"Entrega o respuesta más rápida"},
    {v:"asesoria",i:"🧠",l:"Asesoría personalizada",s:"Acompañamiento real"},
    {v:"seguridad",i:"🔒",l:"Confianza y seguridad",s:"Garantías sólidas"},
    {v:"variedad",i:"🌍",l:"Variedad / Catálogo",s:"Más opciones que nadie"},
    {v:"proceso",i:"📋",l:"Proceso simple",s:"Sin burocracia ni complicaciones"}
  ]},
  {id:"presupuesto",lbl:"Paso 8 de 8",q:"¿Cuál es el presupuesto mensual para contenido?",sub:"Esto nos ayuda a calibrar la propuesta de servicios.",multi:false,grid:true,opts:[
    {v:"sin",i:"🤔",l:"Sin definir aún",s:"Explorando opciones"},
    {v:"bajo",i:"💵",l:"Menos de $500 USD",s:"Arranque inicial"},
    {v:"medio",i:"💵💵",l:"$500 – $2,000 USD",s:"Inversión media"},
    {v:"alto",i:"💵💵💵",l:"Más de $2,000 USD",s:"Escala completa"}
  ]}
];

const STEP_NAMES=["Empresa","Sector","Plataformas","Prioridad","Cliente","Contenido","Diferenciadores","Presupuesto"];
const answers={};
let current=0;

// ─── RENDER PROGRESS ────────────────────────────────────────────────────────
function renderProgress(){
  const pct=Math.round(((current+1)/(STEPS.length+2))*100);
  document.getElementById("prog").style.width=pct+"%";
  const cont=document.getElementById("prog-steps");
  cont.innerHTML=STEPS.map((s,i)=>{
    let cls="prog-step";
    if(i<current)cls+=" done";
    else if(i===current)cls+=" active";
    return `<span class="${cls}">${i<current?"✓ ":""}${STEP_NAMES[i]}</span>`;
  }).join("");
}

// ─── RENDER STEP ────────────────────────────────────────────────────────────
function renderStep(){
  renderProgress();
  const s=STEPS[current];
  const cont=document.getElementById("steps-cont");

  if(s.type==="text"){
    const fieldsHtml=s.fields.map(f=>`
      <div style="margin-bottom:10px">
        ${f.textarea
          ?`<textarea id="field-${f.id}" placeholder="${f.placeholder}" rows="3"></textarea>`
          :`<input type="text" id="field-${f.id}" placeholder="${f.placeholder}">`}
      </div>`).join("");
    cont.innerHTML=`
      <div class="step active">
        <div class="step-label">${s.lbl}</div>
        <div class="step-q">${s.q}</div>
        <div class="step-sub">${s.sub}</div>
        ${fieldsHtml}
        <div class="actions">
          <div></div>
          <button class="btn btn-primary" onclick="nextText()">Siguiente →</button>
        </div>
      </div>`;
    // Restore values
    s.fields.forEach(f=>{
      const el=document.getElementById("field-"+f.id);
      if(el&&answers[f.id])el.value=answers[f.id];
    });
  } else {
    const sel=answers[s.id]||[];
    const optsHtml=s.opts.map(o=>`
      <div class="opt${sel.includes(o.v)?" sel":""}" onclick="toggle('${s.id}','${o.v}',${s.multi})">
        <div class="opt-icon">${o.i}</div>
        <div class="opt-text">
          <div class="opt-lbl">${o.l}</div>
          <div class="opt-sub">${o.s}</div>
        </div>
        <div class="chk"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      </div>`).join("");
    const has=sel.length>0;
    cont.innerHTML=`
      <div class="step active">
        <div class="step-label">${s.lbl}</div>
        <div class="step-q">${s.q}</div>
        <div class="step-sub">${s.sub}</div>
        ${s.multi?'<span class="tag-multi">Selección múltiple</span>':''}
        <div class="opts${s.grid?" grid":""}">${optsHtml}</div>
        <div class="actions">
          ${current>0?`<button class="btn" onclick="back()">← Atrás</button>`:"<div></div>"}
          <button class="btn btn-primary" id="next-btn" onclick="nextOpt()" ${!has?"disabled":""}>
            ${current===STEPS.length-1?"Ver resumen →":"Siguiente →"}
          </button>
        </div>
      </div>`;
  }
}

function toggle(id,val,multi){
  if(!answers[id])answers[id]=[];
  if(multi){const i=answers[id].indexOf(val);if(i>-1)answers[id].splice(i,1);else answers[id].push(val);}
  else answers[id]=[val];
  renderStep();
}
function nextText(){
  const s=STEPS[current];
  let ok=true;
  s.fields.forEach(f=>{
    const el=document.getElementById("field-"+f.id);
    if(el){answers[f.id]=el.value.trim();if(!el.value.trim())ok=false;}
  });
  if(!ok){alert("Por favor completa todos los campos.");return;}
  if(current<STEPS.length-1){current++;renderStep();}else renderSummary();
}
function nextOpt(){
  const s=STEPS[current];
  if(!answers[s.id]||answers[s.id].length===0)return;
  if(current<STEPS.length-1){current++;renderStep();}else renderSummary();
}
function back(){if(current>0){current--;renderStep();}}

// ─── RENDER SUMMARY ─────────────────────────────────────────────────────────
function renderSummary(){
  renderProgress();

// ─── HELPERS ────────────────────────────────────────────────────────────────
function getOptLabels(){
  const map={};
  STEPS.forEach(s=>{if(s.opts)s.opts.forEach(o=>{map[o.v]=o.l;});});
  return map;
}
function fmt(v){const ol=getOptLabels();return Array.isArray(v)?v.map(x=>ol[x]||x).join(", "):(ol[v]||v);}

function copyText(id,btn){
  const el=document.getElementById(id);
  navigator.clipboard.writeText(el.innerText).then(()=>{
    btn.textContent="✓ Copiado";btn.classList.add("ok");
    setTimeout(()=>{btn.textContent="Copiar";btn.classList.remove("ok");},2200);
  });
}
function toggleSec(id){
  document.getElementById("body-"+id).classList.toggle("open");

}

        <span class="sec-badge" style="background:var(--amber-light);color:var(--amber)">4 semanas</span>
        <span class="chev" id="chev-plan">▾</span>
      </div>
      <div class="sec-body" id="body-plan">
        <div class="plan-grid">
          ${d.planBase.map(w=>`
          <div class="plan-week">
            <div class="plan-week-ttl">📅 ${w.semana}</div>
            ${w.items.map(item=>`<div class="plan-item"><div class="plan-dot"></div><span>${item}</span></div>`).join("")}
          </div>`).join("")}
        </div>
      </div>
    </div>

    <!-- PROMPTS -->
    ${[
      {id:"p1",icon:"🔎",ttl:"Prompt — Proyecto de investigación viral",badge:"Etapa 2",bcolor:"var(--blue-light)",tcolor:"var(--blue)",key:"p_invest"},
      {id:"p2",icon:"✍️",ttl:"Prompt — Proyecto de guiones y storyboard",badge:"Etapa 3",bcolor:"var(--coral-light)",tcolor:"var(--coral)",key:"p_guiones"},
      {id:"p3",icon:"🎬",ttl:"Prompt — Proyecto de edición",badge:"Etapa 4",bcolor:"var(--amber-light)",tcolor:"var(--amber)",key:"p_edicion"},
      {id:"p4",icon:"📡",ttl:"Prompt — Proyecto de publicación y métricas",badge:"Etapa 5",bcolor:"#EAF3DE",tcolor:"#27500A",key:"p_publicacion"},
      {id:"p5",icon:"🤝",ttl:"Prompt — Proyecto de CRM y seguimiento",badge:"Etapa 6",bcolor:"#FBEAF0",tcolor:"#72243E",key:"p_crm"}
    ].map(p=>`
    <div class="sec-block">
      <div class="sec-head" onclick="toggleSec('${p.id}')">
        <div class="sec-icon" style="background:${p.bcolor}">${p.icon}</div>
        <div class="sec-ttl">${p.ttl}</div>
        <span class="sec-badge" style="background:${p.bcolor};color:${p.tcolor}">${p.badge}</span>
        <span class="chev" id="chev-${p.id}">▾</span>
      </div>
      <div class="sec-body" id="body-${p.id}">
        <div class="prompt-lbl">Copia y pega en tu proyecto de Claude <span>${p.badge}</span></div>
        <div class="prompt-wrap">
          <div class="prompt-box" id="txt-${p.id}">${escHtml(d[p.key])}</div>
          <button class="copy-btn" onclick="copyText('txt-${p.id}',this)">Copiar</button>
        </div>
      </div>
    </div>`).join("")}

    <!-- ACCIONES -->
    <div class="action-bar">
      <button class="btn btn-primary" onclick="downloadPDF()">⬇ Descargar PDF</button>
      <button class="btn btn-teal" onclick="pushToGitHub()">🐙 Guardar en GitHub</button>
      <button class="btn" onclick="resetForm()">↩ Nuevo diagnóstico</button>
    </div>

    <!-- GITHUB PUSH -->
    <div class="push-section">
      <div class="push-ttl">🐙 Guardar en repositorio de GitHub</div>
      <p style="font-size:12px;color:var(--sub);margin-bottom:12px;line-height:1.6">
        Se guarda como <code>.md</code> en la carpeta configurada en tus variables de entorno de Vercel. Sin credenciales expuestas en el navegador.
      </p>
      <button class="btn btn-teal" style="width:100%;justify-content:center;display:flex;gap:8px" onclick="pushToGitHub()">
        🐙 Guardar diagnóstico en GitHub
      </button>
      <div id="push-status" class="push-status"></div>
    </div>
  </div>`;
}

function escHtml(t){return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function resetForm(){current=0;Object.keys(answers).forEach(k=>delete answers[k]);renderStep();}

// ─── PDF GENERATION ─────────────────────────────────────────────────────────
function downloadPDF(){
  const d=buildStrategy();
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const W=210,M=20,CW=W-M*2;
  let y=M;
  const agencia=document.getElementById("agencia-nombre")?.value||"Agencia";
  const fecha=new Date().toLocaleDateString("es-MX",{day:"numeric",month:"long",year:"numeric"});

  function addPage(){doc.addPage();y=M;}
  function checkPage(need=20){if(y+need>285)addPage();}

  function heading(txt,size=14,color=[83,74,183]){
    checkPage(12);
    doc.setFontSize(size);doc.setFont("helvetica","bold");doc.setTextColor(...color);
    doc.text(txt,M,y);y+=8;
  }
  function subheading(txt){
    checkPage(10);
    doc.setFontSize(11);doc.setFont("helvetica","bold");doc.setTextColor(30,30,30);
    doc.text(txt,M,y);y+=7;
  }
  function body(txt,indent=0){
    doc.setFontSize(10);doc.setFont("helvetica","normal");doc.setTextColor(60,60,60);
    const lines=doc.splitTextToSize(txt,CW-indent);
    checkPage(lines.length*5+3);
    doc.text(lines,M+indent,y);y+=lines.length*5+3;
  }
  function divider(){checkPage(6);doc.setDrawColor(220,220,215);doc.line(M,y,W-M,y);y+=6;}
  function badge(txt,x,yy,bg=[238,237,254],tc=[60,52,137]){
    doc.setFillColor(...bg);doc.roundedRect(x,yy-4,doc.getTextWidth(txt)+8,6,2,2,"F");
    doc.setFontSize(8);doc.setFont("helvetica","bold");doc.setTextColor(...tc);
    doc.text(txt,x+4,yy);
  }
  function box(lines,indent=0){
    const all=[];
    lines.forEach(l=>{const sp=doc.splitTextToSize(l,CW-indent-8);all.push(...sp);});
    checkPage(all.length*5+10);
    doc.setFillColor(249,248,245);doc.roundedRect(M+indent,y-2,CW-indent,all.length*5+8,3,3,"F");
    doc.setFontSize(10);doc.setFont("helvetica","normal");doc.setTextColor(60,60,60);
    doc.text(all,M+indent+4,y+4);y+=all.length*5+12;
  }

  // Cover
  doc.setFillColor(83,74,183);doc.rect(0,0,W,50,"F");
  doc.setFontSize(22);doc.setFont("helvetica","bold");doc.setTextColor(255,255,255);
  doc.text("Diagnóstico de Contenido",M,28);
  doc.setFontSize(13);doc.setFont("helvetica","normal");
  doc.text(d.nombre,M,38);
  doc.setFontSize(9);doc.text(`Generado por ${agencia} · ${fecha}`,M,46);
  y=60;

  // Perfil
  heading("Perfil del Negocio",14);divider();
  [["Empresa",d.nombre],["Giro",d.giro],["Sector",fmt(answers.sector)],
   ["Plataformas",d.pl],["Prioridad",fmt(answers.prioridad)],
   ["Cliente ideal",d.cl],["Diferenciadores",d.di],["Presupuesto",d.bu]]
  .forEach(([k,v])=>{
    checkPage(8);
    doc.setFontSize(9);doc.setFont("helvetica","bold");doc.setTextColor(130,130,130);
    doc.text(k.toUpperCase(),M,y);
    doc.setFontSize(11);doc.setFont("helvetica","bold");doc.setTextColor(30,30,30);
    doc.text(v||"—",M+45,y);y+=7;
  });
  y+=4;

  // Diagnóstico
  heading("Diagnóstico Inicial",14);divider();
  body(d.estadoDiag);
  body("Oportunidad: En el sector "+fmt(answers.sector)+", la mayoría de competidores usan formatos largos. El contenido corto y educativo tiene ventana de entrada clara.");
  y+=4;

  // Contenidos
  addPage();
  heading("Tipos de Contenido Recomendados",14);divider();
  d.contenidos.forEach((c,i)=>{
    subheading(`${i+1}. ${c.t}`);
    body(c.d,4);
    checkPage(8);doc.setFontSize(9);doc.setFont("helvetica","bold");doc.setTextColor(83,74,183);
    doc.text(c.score,M+4,y);y+=8;
  });

  // Hooks
  heading("Hooks Recomendados",14);divider();
  d.hooks.forEach(h=>{
    subheading(h.tipo);
    box([h.txt]);
  });
  body("Estructura base: Hook sin presentación (0-3s) → Contexto (3-15s) → Valor (15-45s) → CTA único (últimos 5s)");
  y+=4;

  // Plan mensual
  addPage();
  heading("Plan Mensual de Contenido",14);divider();
  d.planBase.forEach(w=>{
    subheading(w.semana);
    w.items.forEach(item=>body("• "+item,4));
    y+=3;
  });

  // Prompts
  const promptsData=[
    {ttl:"Prompt — Investigación Viral (Etapa 2)",txt:d.p_invest},
    {ttl:"Prompt — Guiones y Storyboard (Etapa 3)",txt:d.p_guiones},
    {ttl:"Prompt — Edición (Etapa 4)",txt:d.p_edicion},
    {ttl:"Prompt — Publicación y Métricas (Etapa 5)",txt:d.p_publicacion},
    {ttl:"Prompt — CRM y Seguimiento (Etapa 6)",txt:d.p_crm}
  ];
  promptsData.forEach(p=>{
    addPage();
    heading(p.ttl,12);divider();
    doc.setFontSize(9);doc.setFont("helvetica","normal");doc.setTextColor(80,80,80);
    const lines=doc.splitTextToSize(p.txt,CW);
    let i=0;
    while(i<lines.length){
      const chunk=lines.slice(i,i+40);
      if(y+chunk.length*5>280)addPage();
      doc.text(chunk,M,y);y+=chunk.length*5+2;i+=40;
    }
  });

  // Footer en cada página
  const total=doc.getNumberOfPages();
  for(let i=1;i<=total;i++){
    doc.setPage(i);
    doc.setFontSize(8);doc.setFont("helvetica","normal");doc.setTextColor(180,180,180);
    doc.text(`${agencia} · Diagnóstico de contenido · ${d.nombre}`,M,292);
    doc.text(`${i} / ${total}`,W-M,292,{align:"right"});
  }

  const slug=d.nombre.toLowerCase().replace(/\s+/g,"-").replace(/[^a-z0-9-]/g,"");
  doc.save(`diagnostico-${slug}-${Date.now()}.pdf`);
}

// ─── GITHUB PUSH (via Vercel API route — token seguro en env vars) ───────────
async function pushToGitHub(){
  const status=document.getElementById("push-status");
  const d=buildStrategy();
  const agencia=document.getElementById("agencia-nombre")?.value||"Agencia";
  const fecha=new Date().toLocaleDateString("es-MX",{day:"numeric",month:"long",year:"numeric"});
  const slug=d.nombre.toLowerCase().replace(/\s+/g,"-").replace(/[^a-z0-9-]/g,"");
  const ts=new Date().toISOString().slice(0,10);
  const filename=`${ts}-${slug}.md`;

  const content=`# Diagnóstico de Contenido — ${d.nombre}
**Generado por:** ${agencia}
**Fecha:** ${fecha}

---

## Perfil del Negocio
| Campo | Valor |
|---|---|
| Empresa | ${d.nombre} |
| Giro | ${d.giro} |
| Sector | ${fmt(answers.sector)} |
| Plataformas | ${d.pl} |
| Prioridad | ${fmt(answers.prioridad)} |
| Cliente ideal | ${d.cl} |
| Diferenciadores | ${d.di} |
| Presupuesto | ${d.bu} |

---

## Diagnóstico Inicial
${d.estadoDiag}

**Oportunidad:** En el sector ${fmt(answers.sector)}, el contenido corto y educativo tiene ventana de entrada clara. El primero en ejecutarlo bien se queda con la audiencia.

---

## Tipos de Contenido Recomendados
${d.contenidos.map((c,i)=>`### ${i+1}. ${c.t}\n${c.d}\n*${c.score}*`).join("\n\n")}

---

## Hooks Recomendados
${d.hooks.map(h=>`**${h.tipo}**\n> ${h.txt}`).join("\n\n")}

**Estructura base:** Hook sin presentación (0-3s) → Contexto (3-15s) → Valor (15-45s) → CTA único (últimos 5s)

---

## Plan Mensual de Contenido
${d.planBase.map(w=>`### ${w.semana}\n${w.items.map(i=>`- ${i}`).join("\n")}`).join("\n\n")}

---

## Prompts para Proyectos de Claude

### Etapa 2 — Investigación Viral
\`\`\`
${d.p_invest}
\`\`\`

### Etapa 3 — Guiones y Storyboard
\`\`\`
${d.p_guiones}
\`\`\`

### Etapa 4 — Edición
\`\`\`
${d.p_edicion}
\`\`\`

### Etapa 5 — Publicación y Métricas
\`\`\`
${d.p_publicacion}
\`\`\`

### Etapa 6 — CRM y Seguimiento
\`\`\`
${d.p_crm}
\`\`\`
`;

  if(status){status.className="push-status loading";status.textContent="⏳ Guardando en tu repositorio...";}

  try{
    // Llamar a la API route de Vercel (el token está seguro en env vars del servidor)
    const res=await fetch("/api/save",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        filename,
        content,
        commitMessage:`diagnóstico: ${d.nombre} (${ts})`
      })
    });

    const data=await res.json();

    if(res.ok&&data.ok){
      if(status){
        status.className="push-status ok";
        status.innerHTML=`✅ Guardado en <strong>${data.repo}</strong><br>
        📁 <code>${data.path}</code><br>
        ${data.url?`<a href="${data.url}" target="_blank" style="color:var(--teal);font-weight:700">Ver en GitHub →</a>`:""}`;
      }
    } else {
      if(status){
        status.className="push-status err";
        status.textContent=`❌ ${data.error||"Error al guardar. Revisa las variables de entorno en Vercel."}`;
      }
    }
  } catch(e){
    if(status){status.className="push-status err";status.textContent=`❌ Error de conexión: ${e.message}`;}
  }
}

// ─── INIT ────────────────────────────────────────────────────────────────────
renderStep();
</script>
